name: Deploy RomeoFlexVision Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: romeoflexvision

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: romeoflexvision/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Write production environment
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}
        run: |
          cat <<EOF > .env.production
          VITE_GA_MEASUREMENT_ID=${VITE_GA_MEASUREMENT_ID:-}
          VITE_META_PIXEL_ID=${VITE_META_PIXEL_ID:-}
          EOF
          if [ -z "$VITE_GA_MEASUREMENT_ID" ]; then
            echo "::warning::VITE_GA_MEASUREMENT_ID not set - GA4 will be disabled in production"
          fi
          if [ -z "$VITE_META_PIXEL_ID" ]; then
            echo "::warning::VITE_META_PIXEL_ID not set - Meta Pixel will be disabled in production"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build RomeoFlexVision site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: romeoflexvision/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
