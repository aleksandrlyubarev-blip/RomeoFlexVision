name: Deploy RoboQC Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: romeoflexvision

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: romeoflexvision/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Write production environment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SCENE_OPS_URL: ${{ secrets.VITE_SCENE_OPS_URL }}
        run: |
          cat <<EOF > .env.production
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
          VITE_SCENE_OPS_URL=${VITE_SCENE_OPS_URL:-}
          EOF
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::warning::VITE_SUPABASE_URL not set — auth features will be disabled"
          fi
          if [ -z "$VITE_SCENE_OPS_URL" ]; then
            echo "::warning::VITE_SCENE_OPS_URL not set - SceneOps will use mock fallback in production"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build RoboQC landing
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: romeoflexvision/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
